name: RAG Quality Gate

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Also allow manual trigger

jobs:
  trigger-testkube:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Testkube
        uses: kubeshop/setup-testkube@v1
        with:
          organization: ${{ secrets.TK_ORG_ID }}
          environment: ${{ secrets.TK_ENV_ID }}
          token: ${{ secrets.TK_API_TOKEN }}
      
      - name: Run RAG Quality Gate Workflow
        run: |
          testkube run testworkflow rag-quality-gate --watch
