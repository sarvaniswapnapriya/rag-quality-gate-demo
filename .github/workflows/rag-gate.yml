name: RAG Quality Gate

on:
  push:
    branches: [master, test/ai-agent]
    paths:
      - "src/rag/**"
      - "tests/test_rag_eval.py"
      - "tests/fixtures/rag_test_cases.yml"
      - "requirements.txt"
  pull_request:
    branches: [master, test/ai-agent]
    paths:
      - "src/rag/**"
      - "tests/test_rag_eval.py"
      - "tests/fixtures/rag_test_cases.yml"
      - "requirements.txt"
  workflow_dispatch:
jobs:
  run-rag-quality-gate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Testkube RAG Quality Gate
        uses: kubeshop/testkube-run-action@v1
        with:
          organization: ${{ secrets.TK_ORG_ID }}
          environment: ${{ secrets.TK_ENV_ID }}
          token: ${{ secrets.TK_API_TOKEN }}
          test: rag-quality-gate
          namespace: testkube

      - name: Report test results
        if: always()
        run: |
          echo "✅ Testkube workflow completed"
          echo "Check results in GitHub and Testkube Dashboard"
