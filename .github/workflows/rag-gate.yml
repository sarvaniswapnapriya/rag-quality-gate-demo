name: RAG Quality Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  run-testkube-workflow:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Testkube Workflow
        uses: kubeshop/testkube-run-action@v1
        with:
          organization: ${{ secrets.TK_ORG_ID }}
          environment: ${{ secrets.TK_ENV_ID }}
          token: ${{ secrets.TK_API_TOKEN }}
          test: rag-quality-gate
          namespace: testkube
