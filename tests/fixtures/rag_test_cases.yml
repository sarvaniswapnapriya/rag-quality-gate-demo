# tests/fixtures/rag_test_cases.yml
test_cases:
  - id: "qa_001"
    query: "What is your refund policy?"
    expected_answer: "We offer a 30-day full refund on any purchase, no questions asked."
    retrieval_context:
      - "Refund Policy: All customers are eligible for a 30-day full refund on any purchase."
    category: "policy"

  - id: "qa_002"
    query: "How long does shipping take?"
    expected_answer: "Standard shipping takes 5-7 business days. Express takes 2-3 business days."
    retrieval_context:
      - "Shipping: Standard shipping takes 5-7 business days. Express shipping takes 2-3 business days."
    category: "shipping"

  - id: "qa_003"
    query: "What payment methods do you accept?"
    expected_answer: "We accept Visa, MasterCard, American Express, PayPal, Apple Pay, and Google Pay."
    retrieval_context:
      - "Payment Methods: We accept Visa, MasterCard, American Express, PayPal, Apple Pay, and Google Pay."
    category: "billing"

  - id: "qa_004"
    query: "How do I track my order?"
    expected_answer: "Log into your Account Dashboard and go to Order History to see tracking updates."
    retrieval_context:
      - "Order Tracking: Orders can be tracked in Account Dashboard under Order History."
    category: "shipping"

  - id: "qa_005"
    query: "How do I reset my password?"
    expected_answer: "Click 'Forgot Password' on the login page and follow the emailed reset link."
    retrieval_context:
      - "Password Reset: Click 'Forgot Password' on the login page. Reset links are sent to your registered email."
    category: "account"

  - id: "qa_006"
    query: "Can I return items after 30 days?"
    expected_answer: "No, refunds are only available within 30 days of purchase."
    retrieval_context:
      - "Refund Policy: All customers are eligible for a 30-day full refund on any purchase."
    category: "policy"

  - id: "qa_007"
    query: "Do you accept credit cards?"
    expected_answer: "Yes, we accept Visa, MasterCard, and American Express."
    retrieval_context:
      - "Payment Methods: We accept Visa, MasterCard, American Express, PayPal, Apple Pay, and Google Pay."
    category: "billing"

  - id: "qa_008"
    query: "Is express shipping available?"
    expected_answer: "Yes, express shipping takes 2-3 business days."
    retrieval_context:
      - "Shipping: Express shipping takes 2-3 business days."
    category: "shipping"

  - id: "qa_009"
    query: "How long is a password reset link valid?"
    expected_answer: "Password reset links expire after 24 hours."
    retrieval_context:
      - "Reset links are sent to your registered email and expire after 24 hours."
    category: "account"

  - id: "qa_010"
    query: "Do you offer bulk discounts?"
    expected_answer: "Yes, for orders over 50 units. Contact sales@company.com for pricing."
    retrieval_context:
      - "Bulk Orders: Discounts are available for purchases exceeding 50 units."
    category: "pricing"

  - id: "qa_011"
    query: "Can I use PayPal?"
    expected_answer: "Yes, PayPal is an accepted payment method."
    retrieval_context:
      - "Payment Methods: We accept Visa, MasterCard, American Express, PayPal, Apple Pay, and Google Pay."
    category: "billing"

  - id: "qa_012"
    query: "What if my order is delayed?"
    expected_answer: "Check your order tracking status first, then contact support if needed."
    retrieval_context:
      - "Order Tracking: Orders can be tracked in Account Dashboard under Order History."
    category: "shipping"

  - id: "qa_013"
    query: "Is Apple Pay accepted?"
    expected_answer: "Yes, Apple Pay is accepted as a payment method."
    retrieval_context:
      - "Payment Methods: We accept Visa, MasterCard, American Express, PayPal, Apple Pay, and Google Pay."
    category: "billing"

  - id: "qa_014"
    query: "Can I get overnight shipping?"
    expected_answer: "Yes, overnight options are available in most regions."
    retrieval_context:
      - "Shipping: Overnight options are available in most regions."
    category: "shipping"

  - id: "qa_015"
    query: "Who do I contact for bulk orders?"
    expected_answer: "Contact sales@company.com for enterprise pricing and bulk orders."
    retrieval_context:
      - "Bulk Orders: Contact sales@company.com for enterprise pricing."
    category: "pricing"

  - id: "qa_016"
    query: "What's the return window?"
    expected_answer: "The return window is 30 days from the original purchase date."
    retrieval_context:
      - "Returns must be initiated within 30 days of the original purchase date."
    category: "policy"

  - id: "qa_017"
    query: "Do you accept Google Pay?"
    expected_answer: "Yes, Google Pay is accepted."
    retrieval_context:
      - "Payment Methods: We accept Visa, MasterCard, American Express, PayPal, Apple Pay, and Google Pay."
    category: "billing"

  - id: "qa_018"
    query: "How quickly will I get my refund?"
    expected_answer: "Refunds are processed within 30 days of return initiation."
    retrieval_context:
      - "Refund Policy: Returns must be initiated within 30 days of the original purchase date."
    category: "policy"

  - id: "qa_019"
    query: "Where can I see my past orders?"
    expected_answer: "Go to your Account Dashboard and click on Order History."
    retrieval_context:
      - "Order History: Orders can be tracked in Account Dashboard under Order History."
    category: "shipping"

  - id: "qa_020"
    query: "What email will I receive for order updates?"
    expected_answer: "Automatic email updates are sent when orders ship and arrive."
    retrieval_context:
      - "Customers receive automatic email updates when orders ship and arrive."
    category: "shipping"
